name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, Windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image (with cache)
        run: |
          docker build \
            --cache-from=${{ secrets.DOCKER_USERNAME }}/logistics-agent:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/logistics-agent:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/logistics-agent:latest

      #removed kubectl config setup as it's already done in the self-hosted runner

      - name: Create/Update Secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --from-literal=TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy
        run: |
          kubectl apply -f k8s-deployment.yaml
          kubectl rollout restart deployment logistics-agent
          